[pytest]
DJANGO_SETTINGS_MODULE = app.settings
python_files = tests.py test_*.py *_tests.py

from django.contrib.auth.models import User
from rest_framework.test import APIClient
from rest_framework import status
from django.urls import reverse
from tanks.models import Nation, Level, Crewman, Tank, BattleRecord

# ---------------------- Фикстуры ----------------------

@pytest.fixture
def api_client():
    return APIClient()

@pytest.fixture
def user(db):
    return User.objects.create_user(username='testuser', password='testpass123', email='test@example.com')

@pytest.fixture
def crewman(db, user):
    return Crewman.objects.create(user=user, credits=10000, garage_slots=3)

@pytest.fixture
def auth_client(api_client, user):
    api_client.force_authenticate(user=user)
    return api_client

@pytest.fixture
def nation(db):
    return Nation.objects.create(name='СССР')

@pytest.fixture
def level1(db):
    return Level.objects.create(level_number=1, base_cost=1000)

@pytest.fixture
def level2(db):
    return Level.objects.create(level_number=2, base_cost=1000)

@pytest.fixture
def tank(db, crewman, nation, level1):
    return Tank.objects.create(
        name='Т-34',
        owner=crewman,
        nation=nation,
        level=level1,
        is_in_battle=False
    )

# ---------------------- Тесты для Nation ----------------------
@pytest.mark.django_db
class TestNationAPI:
    def test_list_nations(self, api_client, nation):
        url = reverse('nation-list')
        response = api_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert len(response.data) == 1
        assert response.data[0]['name'] == 'СССР'

    def test_retrieve_nation(self, api_client, nation):
        url = reverse('nation-detail', args=[nation.id])
        response = api_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['name'] == 'СССР'

