# ---------------------- Тесты для Crewman (регистрация, профиль, ангар) ----------------------
@pytest.mark.django_db
class TestCrewmanAPI:
    def test_register(self, api_client):
        url = reverse('crewman-register')
        data = {
            'username': 'newuser',
            'password': 'newpass123',
            'email': 'new@example.com'
        }
        response = api_client.post(url, data)
        assert response.status_code == status.HTTP_201_CREATED
        assert User.objects.filter(username='newuser').exists()
        crewman = Crewman.objects.get(user__username='newuser')
        assert crewman.credits == 1000
        assert crewman.garage_slots == 3

    def test_profile_authenticated(self, auth_client, crewman):
        url = reverse('crewman-profile')
        response = auth_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['credits'] == 10000
        assert response.data['garage_slots'] == 3

    def test_profile_unauthenticated(self, api_client):
        url = reverse('crewman-profile')
        response = api_client.get(url)
        assert response.status_code == status.HTTP_401_UNAUTHORIZED

    def test_expand_garage(self, auth_client, crewman):
        url = reverse('crewman-expand-garage')
        response = auth_client.post(url)
        assert response.status_code == status.HTTP_200_OK
        crewman.refresh_from_db()
        assert crewman.garage_slots == 4
        assert crewman.credits == 9500  # 10000 - 500

    def test_expand_garage_insufficient_credits(self, auth_client, crewman):
        crewman.credits = 100
        crewman.save()
        url = reverse('crewman-expand-garage')
        response = auth_client.post(url)
        assert response.status_code == status.HTTP_400_BAD_REQUEST
        assert response.data['success'] is False

# ---------------------- Тесты для Tank (CRUD + upgrade, sell) ----------------------
@pytest.mark.django_db
class TestTankAPI:
    def test_list_tanks(self, auth_client, tank):
        url = reverse('tank-list')
        response = auth_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert len(response.data) == 1
        assert response.data[0]['name'] == 'Т-34'

    def test_retrieve_tank(self, auth_client, tank):
        url = reverse('tank-detail', args=[tank.id])
        response = auth_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['name'] == 'Т-34'

    def test_create_tank(self, auth_client, crewman, nation, level1):
        url = reverse('tank-create')
        data = {
            'name': 'КВ-1',
            'nation': nation.id,
            'level': level1.id
        }
        response = auth_client.post(url, data)
        assert response.status_code == status.HTTP_201_CREATED
        assert Tank.objects.filter(name='КВ-1').exists()
        crewman.refresh_from_db()
        # стоимость создания level1 = 1000, начальные кредиты 10000 - 1000 = 9000
        assert crewman.credits == 9000

    def test_create_tank_no_free_slot(self, auth_client, crewman, nation, level1):
        crewman.garage_slots = 1
        crewman.save()
        # уже есть один танк (tank фикстура)
        url = reverse('tank-create')
        data = {
            'name': 'КВ-1',
            'nation': nation.id,
            'level': level1.id
        }
        response = auth_client.post(url, data)
        assert response.status_code == status.HTTP_400_BAD_REQUEST
        assert response.data['error'] == 'No free garage slots'

    def test_upgrade_tank(self, auth_client, tank, level2, crewman):
        # нужно добавить level2 в БД (фикстура level2 есть)
        url = reverse('tank-upgrade', args=[tank.id])
        response = auth_client.post(url)
        assert response.status_code == status.HTTP_200_OK
        tank.refresh_from_db()
        assert tank.level.level_number == 2
        crewman.refresh_from_db()
        # стоимость повышения с 1 на 2 = 1500, кредиты были 10000 - 1500 = 8500
        assert crewman.credits == 8500

    def test_upgrade_tank_in_battle(self, auth_client, tank):
        tank.is_in_battle = True
        tank.save()
        url = reverse('tank-upgrade', args=[tank.id])
        response = auth_client.post(url)
        assert response.status_code == status.HTTP_400_BAD_REQUEST
        assert response.data['error'] == 'Tank is in battle'

    def test_sell_tank(self, auth_client, tank, crewman):
        url = reverse('tank-sell', args=[tank.id])
        response = auth_client.post(url)
        assert response.status_code == status.HTTP_200_OK
        assert not Tank.objects.filter(id=tank.id).exists()
        crewman.refresh_from_db()
        # цена продажи = половина стоимости создания (1000/2=500), кредиты были 10000+500=10500
        assert crewman.credits == 10500

    def test_delete_tank(self, auth_client, tank):
        url = reverse('tank-detail', args=[tank.id])
        response = auth_client.delete(url)
        assert response.status_code == status.HTTP_204_NO_CONTENT
        assert not Tank.objects.filter(id=tank.id).exists()

# ---------------------- Тесты для BattleRecord ----------------------
@pytest.mark.django_db
class TestBattleAPI:
    def test_start_battle_victory(self, auth_client, tank, level1, crewman):
        url = reverse('battle-start')
        data = {
            'tank_id': tank.id,
            'battle_level_id': level1.id
        }
        response = auth_client.post(url, data)
        assert response.status_code == status.HTTP_201_CREATED
        assert response.data['result'] == 'victory'
        assert response.data['reward_earned'] == level1.battle_reward
        crewman.refresh_from_db()
        assert crewman.credits == 10000 + level1.battle_reward

    def test_start_battle_defeat(self, auth_client, tank, level2, crewman, monkeypatch):
        # Мокируем random, чтобы гарантировать поражение (шанс 25%)
        def mock_randint(a, b):
            return 100  # >25
        monkeypatch.setattr('random.randint', mock_randint)

        url = reverse('battle-start')
        data = {
            'tank_id': tank.id,
            'battle_level_id': level2.id
        }
        response = auth_client.post(url, data)
        assert response.status_code == status.HTTP_201_CREATED
        assert response.data['result'] == 'defeat'
        assert response.data['reward_earned'] == 0
        crewman.refresh_from_db()
        assert crewman.credits == 10000

    def test_start_battle_invalid_level(self, auth_client, tank, level2):
        # tank уровень 1, level2 = 2 – допустимо (1±1), но проверим уровень 3 недопустимый
        level3 = Level.objects.create(level_number=3, base_cost=1000)
        url = reverse('battle-start')
        data = {
            'tank_id': tank.id,
            'battle_level_id': level3.id
        }
        response = auth_client.post(url, data)
        assert response.status_code == status.HTTP_400_BAD_REQUEST
        assert response.data['error'] == 'Battle level not available for this tank'

    def test_list_battles(self, auth_client, tank, level1, crewman):
        battle = BattleRecord.objects.create(
            tank=tank,
            crewman=crewman,
            battle_level=level1,
            result='victory',
            reward_earned=level1.battle_reward
        )
        url = reverse('battle-list')
        response = auth_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert len(response.data) == 1
        assert response.data[0]['id'] == battle.id

# ---------------------- Тесты для User (аутентификация) ----------------------
@pytest.mark.django_db
class TestUserAPI:
    def test_login_success(self, api_client, user):
        url = reverse('user-login')
        data = {'username': 'testuser', 'password': 'testpass123'}
        response = api_client.post(url, data)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['success'] is True

    def test_login_fail(self, api_client):
        url = reverse('user-login')
        data = {'username': 'wrong', 'password': 'wrong'}
        response = api_client.post(url, data)
        assert response.status_code == status.HTTP_401_UNAUTHORIZED
        assert response.data['success'] is False

    def test_logout(self, auth_client):
        url = reverse('user-logout')
        response = auth_client.post(url)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['success'] is True

    def test_info_authenticated(self, auth_client, crewman):
        url = reverse('user-info')
        response = auth_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['username'] == 'testuser'
        assert response.data['is_authenticated'] is True
        assert response.data['credits'] == 10000

    def test_info_unauthenticated(self, api_client):
        url = reverse('user-info')
        response = api_client.get(url)
        assert response.status_code == status.HTTP_200_OK
        assert response.data['username'] is None
        assert response.data['is_authenticated'] is False